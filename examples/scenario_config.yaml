tables:
  customers:
    count: 250
    fields:
      customer_id:
        sequence:
          start: 1000
      name:
        faker: name
      address:
        faker: street_address
        scenarios:
          missing_probability: 0.10
      customer_external_id:
        faker: bothify
        text: "CUST-#####"
        scenarios:
          placeholder_values:
            values: ["UNKNOWN", "MISSING", "TEMP-ID"]
            probability: 0.04

  orders:
    count: 2000
    time_profile:
      column: event_ts
      start: "2026-01-01T00:00:00"
      end: "2026-03-31T23:59:59"
      day_of_week_weights:
        monday: 0.9
        tuesday: 1.0
        wednesday: 1.0
        thursday: 1.1
        friday: 1.4
        saturday: 0.6
        sunday: 0.5
      hour_weights:
        "0": 0.2
        "1": 0.15
        "2": 0.15
        "3": 0.15
        "4": 0.2
        "5": 0.3
        "6": 0.5
        "7": 0.8
        "8": 1.2
        "9": 1.8
        "10": 1.5
        "11": 1.3
        "12": 1.4
        "13": 1.4
        "14": 1.3
        "15": 1.2
        "16": 1.4
        "17": 1.8
        "18": 2.0
        "19": 1.5
        "20": 1.1
        "21": 0.8
        "22": 0.5
        "23": 0.3
      seasonal_bursts:
        - start: "2026-02-10T00:00:00"
          end: "2026-02-16T23:59:59"
          multiplier: 4.0

    fields:
      order_id:
        sequence:
          start: 1
      customer_id:
        fk: customers.customer_id
      status:
        weighted_choice:
          values: ["created", "shipped", "cancelled", "returned"]
          weights: [0.60, 0.28, 0.08, 0.04]
      amount:
        faker: pyfloat
        left_digits: 3
        right_digits: 2
        positive: true
        min_value: 5
        max_value: 500
        scenarios:
          outlier:
            probability: 0.02
            multiplier_min: 8
            multiplier_max: 30
            round: 2
      shipping_address:
        faker: street_address
        scenarios:
          missing_probability: 0.08
      tracking_id:
        faker: bothify
        text: "TRK-########"
        scenarios:
          placeholder_values:
            values: ["UNKNOWN", "NA", "PENDING"]
            probability: 0.03

    scenarios:
      null_bursts:
        - columns: [shipping_address]
          burst_count: 3
          burst_length_min: 15
          burst_length_max: 40
      incompleteness:
        columns:
          tracking_id: 0.04
